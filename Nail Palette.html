<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nail Palette</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          serif: ['"DM Serif Display"', 'Georgia', 'serif'],
        },
      },
    },
  };
</script>
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; font-family: Inter, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
    50%      { opacity: 1; transform: scale(1.1) rotate(20deg); }
  }
  @keyframes heartFloat {
    0%   { opacity: 0; transform: translateY(0) translateX(0) scale(0.6); }
    20%  { opacity: 1; transform: translateY(-30px) translateX(calc(var(--drift) * 0.3)) scale(1.1); }
    100% { opacity: 0; transform: translateY(-180px) translateX(var(--drift)) scale(0.7); }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  [data-motion="off"] *,
  [data-motion="off"] *::before,
  [data-motion="off"] *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 via-rose-100 to-purple-100">
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="#fce7f3"/>
<rect x="38" y="30" width="24" height="34" rx="12" fill="#ec4899"/>
<ellipse cx="50" cy="30" rx="12" ry="6" fill="#f9a8d4"/>
</svg>
</template>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="app.jsx?v=8"></script>
</body>
</html>
